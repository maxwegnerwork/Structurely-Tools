<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structurely — Unit Economics & Margin Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0c1220 0%, #0f172a 40%, #0e1525 100%);
            color: #e2e8f0;
            font-family: 'DM Sans', -apple-system, sans-serif;
            padding: 32px 24px;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { margin-bottom: 32px; }
        .header-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .header-accent { width: 8px; height: 32px; background: linear-gradient(180deg, #10b981, #059669); border-radius: 4px; }
        .header h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
        .header p { color: #64748b; font-size: 14px; padding-left: 20px; }
        .section-label { font-size: 13px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
        .card { background: rgba(15,23,42,0.6); border: 1px solid rgba(100,140,180,0.2); border-radius: 12px; padding: 20px 24px; margin-bottom: 16px; }
        .card:hover { border-color: rgba(100,140,180,0.35); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
        .grid-5 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 12px; }
        .grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .input-label { font-size: 10px; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .input-wrap { display: flex; align-items: center; background: rgba(30,41,59,0.8); border-radius: 6px; border: 1px solid rgba(100,140,180,0.15); padding: 6px 10px; }
        .input-wrap:focus-within { border-color: rgba(16,185,129,0.5); box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
        .input-wrap input { background: transparent; border: none; color: #e2e8f0; font-size: 14px; font-weight: 600; width: 100%; outline: none; font-family: 'JetBrains Mono', monospace; }
        .input-wrap input:focus { color: #fff; }
        .input-wrap input:disabled { color: #94a3b8; }
        .input-prefix { color: #64748b; font-size: 13px; margin-right: 2px; }
        .input-suffix { color: #64748b; font-size: 12px; margin-left: 2px; }
        
        .tier-card { margin-bottom: 16px; border-left: 4px solid; }
        .tier-individual { border-left-color: #3b82f6; }
        .tier-small { border-left-color: #8b5cf6; }
        .tier-large { border-left-color: #f59e0b; }
        .tier-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .tier-name { font-size: 18px; font-weight: 700; }
        .tier-margin { text-align: right; }
        .tier-margin-value { font-size: 32px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
        .tier-margin-label { font-size: 10px; color: #64748b; text-transform: uppercase; }
        
        .breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(100,140,180,0.1); }
        .breakdown-section h4 { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .breakdown-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
        .breakdown-row span:last-child { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
        
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .summary-box { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); border-radius: 10px; padding: 20px; text-align: center; }
        .summary-box.warn { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); }
        .summary-box.danger { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); }
        .summary-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .summary-value { font-size: 28px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
        .summary-sub { font-size: 12px; color: #94a3b8; margin-top: 4px; }
        
        .green { color: #10b981; }
        .yellow { color: #f59e0b; }
        .red { color: #ef4444; }
        .blue { color: #3b82f6; }
        .purple { color: #8b5cf6; }
        .muted { color: #94a3b8; }
        
        .formula-box { background: rgba(30,41,59,0.5); border-radius: 8px; padding: 12px 16px; margin-top: 12px; font-size: 12px; color: #94a3b8; }
        .formula-box code { color: #10b981; font-family: 'JetBrains Mono', monospace; }
        
        .logo-text { font-size: 12px; font-weight: 600; color: #64748b; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
        .footer { text-align: center; margin-top: 24px; font-size: 11px; color: #334155; }
        
        @media (max-width: 768px) { 
            .grid-2, .grid-3, .grid-4, .grid-5, .grid-6, .summary-grid { grid-template-columns: 1fr 1fr; } 
            body { padding: 16px 12px; }
            .breakdown { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const state = {
    costs: {
        textPerToken: 0.025,      // Cost per text (1 token = 1 text)
        callPerMinute: 0.20,      // Cost per call minute
        tokensPerCallMinute: 6,   // How many tokens = 1 minute of call (1 token = 10 seconds)
        csPerHour: 110            // Customer service cost per hour
    },
    tiers: [
        {
            name: "Individual Producer",
            platformFee: 99,
            includedTokens: 1000,
            textPct: 75,
            callPct: 25,
            csHours: 0,
            mixPct: 60
        },
        {
            name: "Small Team",
            platformFee: 499,
            includedTokens: 5000,
            textPct: 75,
            callPct: 25,
            csHours: 1,
            mixPct: 30
        },
        {
            name: "Large Team",
            platformFee: 999,
            includedTokens: 10000,
            textPct: 75,
            callPct: 25,
            csHours: 2,
            mixPct: 10
        }
    ]
};

function fmt(n) { return "$" + n.toFixed(2); }
function fmt4(n) { return "$" + n.toFixed(4); }
function fmtWhole(n) { return "$" + Math.round(n).toLocaleString(); }
function fmtPct(n) { return n.toFixed(1) + "%"; }

function calcTierEconomics(tier) {
    const { textPerToken, callPerMinute, tokensPerCallMinute, csPerHour } = state.costs;
    
    // Calculate cost per call token
    const callPerToken = callPerMinute / tokensPerCallMinute;
    
    // Token usage
    const textTokens = tier.includedTokens * (tier.textPct / 100);
    const callTokens = tier.includedTokens * (tier.callPct / 100);
    
    // Token costs
    const textCost = textTokens * textPerToken;
    const callCost = callTokens * callPerToken;
    const totalTokenCost = textCost + callCost;
    
    // CS cost
    const csCost = tier.csHours * csPerHour;
    
    // Totals
    const totalCOGS = totalTokenCost + csCost;
    const grossProfit = tier.platformFee - totalCOGS;
    const grossMargin = tier.platformFee > 0 ? (grossProfit / tier.platformFee) * 100 : 0;
    
    // Blended cost per token for this tier
    const blendedCostPerToken = tier.includedTokens > 0 ? totalTokenCost / tier.includedTokens : 0;
    
    // Call minutes equivalent
    const callMinutes = callTokens / tokensPerCallMinute;
    
    return {
        textTokens, callTokens, callMinutes,
        textCost, callCost, totalTokenCost,
        csCost, totalCOGS, grossProfit, grossMargin,
        blendedCostPerToken, callPerToken
    };
}

function render() {
    const app = document.getElementById("app");
    const { textPerToken, callPerMinute, tokensPerCallMinute, csPerHour } = state.costs;
    const callPerToken = callPerMinute / tokensPerCallMinute;
    
    // Calculate all tiers
    const tierResults = state.tiers.map(t => ({ tier: t, ...calcTierEconomics(t) }));
    
    // Blended metrics (weighted by client mix %)
    const totalMix = tierResults.reduce((s, t) => s + t.tier.mixPct, 0);
    const blendedRevenue = tierResults.reduce((s, t) => s + (t.tier.platformFee * t.tier.mixPct / 100), 0);
    const blendedCOGS = tierResults.reduce((s, t) => s + (t.totalCOGS * t.tier.mixPct / 100), 0);
    const blendedProfit = tierResults.reduce((s, t) => s + (t.grossProfit * t.tier.mixPct / 100), 0);
    const blendedMargin = blendedRevenue > 0 ? (blendedProfit / blendedRevenue) * 100 : 0;
    
    let html = `
    <div class="header">
        <div class="logo-text">Structurely</div>
        <div class="header-bar"><div class="header-accent"></div><h1>Unit Economics & Margin Calculator</h1></div>
        <p>Model token costs, operational expenses, and gross margin by tier</p>
    </div>
    
    <div class="section-label">Cost Inputs</div>
    <div class="card">
        <div class="grid-4">
            ${inputField("Text Cost (per token)", "costs.textPerToken", textPerToken, "$", "", 0.001)}
            ${inputField("Call Cost (per minute)", "costs.callPerMinute", callPerMinute, "$", "", 0.01)}
            ${inputField("Tokens per Call Minute", "costs.tokensPerCallMinute", tokensPerCallMinute, "", "tokens", 1)}
            ${inputField("CS Cost (per hour)", "costs.csPerHour", csPerHour, "$", "", 1)}
        </div>
        <div class="formula-box">
            <strong>Derived:</strong> Call cost per token = <code>${fmt4(callPerToken)}</code> 
            (${fmt(callPerMinute)}/min ÷ ${tokensPerCallMinute} tokens/min)
        </div>
    </div>`;
    
    // Tier cards
    html += `<div class="section-label">Tier Economics</div>`;
    
    const tierClasses = ['tier-individual', 'tier-small', 'tier-large'];
    const tierColors = ['blue', 'purple', 'yellow'];
    
    state.tiers.forEach((tier, i) => {
        const r = tierResults[i];
        const marginClass = r.grossMargin >= 60 ? 'green' : r.grossMargin >= 40 ? 'yellow' : 'red';
        
        html += `
        <div class="card tier-card ${tierClasses[i]}">
            <div class="tier-header">
                <div class="tier-name">${tier.name}</div>
                <div class="tier-margin">
                    <div class="tier-margin-value ${marginClass}">${fmtPct(r.grossMargin)}</div>
                    <div class="tier-margin-label">Gross Margin</div>
                </div>
            </div>
            
            <div class="grid-4">
                ${inputField("Platform Fee", "tiers."+i+".platformFee", tier.platformFee, "$", "/mo", 1)}
                ${inputField("Included Tokens", "tiers."+i+".includedTokens", tier.includedTokens, "", "", 100)}
                ${inputField("Text %", "tiers."+i+".textPct", tier.textPct, "", "%", 5)}
                ${inputField("Call %", "tiers."+i+".callPct", tier.callPct, "", "%", 5)}
            </div>
            <div class="grid-4" style="margin-top:10px">
                ${inputField("CS Hours/Mo", "tiers."+i+".csHours", tier.csHours, "", "hrs", 0.5)}
                ${inputField("Client Mix %", "tiers."+i+".mixPct", tier.mixPct, "", "%", 5)}
                <div>
                    <div class="input-label">Gross Profit</div>
                    <div class="input-wrap"><span class="input-prefix">$</span><input type="text" value="${r.grossProfit.toFixed(2)}" disabled style="color:${r.grossProfit >= 0 ? '#10b981' : '#ef4444'}"></div>
                </div>
                <div>
                    <div class="input-label">Weighted Contribution</div>
                    <div class="input-wrap"><span class="input-prefix">$</span><input type="text" value="${(r.grossProfit * tier.mixPct / 100).toFixed(2)}" disabled style="color:#94a3b8"></div>
                </div>
            </div>
            
            <div class="breakdown">
                <div class="breakdown-section">
                    <h4>Token Breakdown</h4>
                    <div class="breakdown-row"><span>Text tokens (${tier.textPct}%)</span><span>${Math.round(r.textTokens).toLocaleString()}</span></div>
                    <div class="breakdown-row"><span>Text cost</span><span class="muted">${fmt(r.textCost)}</span></div>
                    <div class="breakdown-row"><span>Call tokens (${tier.callPct}%)</span><span>${Math.round(r.callTokens).toLocaleString()}</span></div>
                    <div class="breakdown-row"><span>Call minutes</span><span class="muted">${r.callMinutes.toFixed(1)} min</span></div>
                    <div class="breakdown-row"><span>Call cost</span><span class="muted">${fmt(r.callCost)}</span></div>
                    <div class="breakdown-row" style="border-top:1px solid rgba(100,140,180,0.2);padding-top:8px;margin-top:4px"><span><strong>Total Token COGS</strong></span><span>${fmt(r.totalTokenCost)}</span></div>
                </div>
                <div class="breakdown-section">
                    <h4>Cost Summary</h4>
                    <div class="breakdown-row"><span>Token COGS</span><span>${fmt(r.totalTokenCost)}</span></div>
                    <div class="breakdown-row"><span>CS Cost (${tier.csHours} hrs × ${fmt(csPerHour)})</span><span>${fmt(r.csCost)}</span></div>
                    <div class="breakdown-row" style="border-top:1px solid rgba(100,140,180,0.2);padding-top:8px;margin-top:4px"><span><strong>Total COGS</strong></span><span class="red">${fmt(r.totalCOGS)}</span></div>
                    <div class="breakdown-row"><span><strong>Revenue</strong></span><span>${fmt(tier.platformFee)}</span></div>
                    <div class="breakdown-row"><span><strong>Gross Profit</strong></span><span class="${marginClass}">${fmt(r.grossProfit)}</span></div>
                    <div class="breakdown-row"><span>Blended cost/token</span><span class="muted">${fmt4(r.blendedCostPerToken)}</span></div>
                </div>
            </div>
        </div>`;
    });
    
    // Summary
    html += `
    <div class="section-label">Blended Portfolio Summary (Weighted by Client Mix)</div>
    <div class="summary-grid">
        <div class="summary-box"><div class="summary-label">Blended MRR</div><div class="summary-value">${fmt(blendedRevenue)}</div><div class="summary-sub">per avg client</div></div>
        <div class="summary-box ${blendedCOGS > blendedRevenue * 0.5 ? 'warn' : ''}"><div class="summary-label">Blended COGS</div><div class="summary-value red">${fmt(blendedCOGS)}</div><div class="summary-sub">per avg client</div></div>
        <div class="summary-box"><div class="summary-label">Blended Gross Profit</div><div class="summary-value ${blendedProfit >= 0 ? 'green' : 'red'}">${fmt(blendedProfit)}</div><div class="summary-sub">per avg client</div></div>
        <div class="summary-box ${blendedMargin < 50 ? 'danger' : blendedMargin < 60 ? 'warn' : ''}"><div class="summary-label">Blended Gross Margin</div><div class="summary-value ${blendedMargin >= 60 ? 'green' : blendedMargin >= 40 ? 'yellow' : 'red'}">${fmtPct(blendedMargin)}</div><div class="summary-sub">target: 60%+</div></div>
    </div>`;
    
    // Sensitivity table
    html += `
    <div class="section-label">Token Inclusion Sensitivity</div>
    <div class="card">
        <p style="font-size:13px;color:#94a3b8;margin-bottom:16px;">How margin changes with different token allocations (using current mix & costs)</p>
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
            <thead>
                <tr style="border-bottom:2px solid rgba(100,140,180,0.2);">
                    <th style="text-align:left;padding:8px;color:#64748b;">Tier</th>
                    <th style="text-align:right;padding:8px;color:#64748b;">500 tokens</th>
                    <th style="text-align:right;padding:8px;color:#64748b;">1,000 tokens</th>
                    <th style="text-align:right;padding:8px;color:#64748b;">2,500 tokens</th>
                    <th style="text-align:right;padding:8px;color:#64748b;">5,000 tokens</th>
                    <th style="text-align:right;padding:8px;color:#64748b;">10,000 tokens</th>
                </tr>
            </thead>
            <tbody>`;
    
    [500, 1000, 2500, 5000, 10000].forEach((tokens, colIdx) => {
        if (colIdx === 0) {
            state.tiers.forEach((tier, i) => {
                html += `<tr style="border-bottom:1px solid rgba(100,140,180,0.1);">
                    <td style="padding:8px;font-weight:600;">${tier.name}</td>`;
                [500, 1000, 2500, 5000, 10000].forEach(t => {
                    const testTier = { ...tier, includedTokens: t };
                    const result = calcTierEconomics(testTier);
                    const mClass = result.grossMargin >= 60 ? 'green' : result.grossMargin >= 40 ? 'yellow' : 'red';
                    html += `<td style="text-align:right;padding:8px;font-family:'JetBrains Mono',monospace;" class="${mClass}">${fmtPct(result.grossMargin)}</td>`;
                });
                html += `</tr>`;
            });
        }
    });
    
    html += `</tbody></table></div>`;
    
    // CS Hours sensitivity table
    html += `
    <div class="section-label">CS Hours Sensitivity</div>
    <div class="card">
        <p style="font-size:13px;color:#94a3b8;margin-bottom:16px;">How margin changes with different CS hours/month (using current token allocation & costs)</p>
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
            <thead>
                <tr style="border-bottom:2px solid rgba(100,140,180,0.2);">
                    <th style="text-align:left;padding:8px;color:#64748b;">Tier</th>
                    <th style="text-align:right;padding:8px;color:#64748b;">0 hrs</th>
                    <th style="text-align:right;padding:8px;color:#64748b;">1 hr</th>
                    <th style="text-align:right;padding:8px;color:#64748b;">2 hrs</th>
                    <th style="text-align:right;padding:8px;color:#64748b;">4 hrs</th>
                    <th style="text-align:right;padding:8px;color:#64748b;">8 hrs</th>
                    <th style="text-align:right;padding:8px;color:#64748b;">16 hrs</th>
                </tr>
            </thead>
            <tbody>`;
    
    state.tiers.forEach((tier, i) => {
        html += `<tr style="border-bottom:1px solid rgba(100,140,180,0.1);">
            <td style="padding:8px;font-weight:600;">${tier.name}</td>`;
        [0, 1, 2, 4, 8, 16].forEach(hrs => {
            const testTier = { ...tier, csHours: hrs };
            const result = calcTierEconomics(testTier);
            const mClass = result.grossMargin >= 60 ? 'green' : result.grossMargin >= 40 ? 'yellow' : 'red';
            html += `<td style="text-align:right;padding:8px;font-family:'JetBrains Mono',monospace;" class="${mClass}">${fmtPct(result.grossMargin)}</td>`;
        });
        html += `</tr>`;
    });
    
    html += `</tbody></table>
        <div class="formula-box" style="margin-top:12px;">
            <strong>CS Cost Impact:</strong> Each hour of CS = <code>${fmt(csPerHour)}</code> added to COGS
        </div>
    </div>`;
    
    html += `<div class="footer">Structurely Confidential — Q2 2026 | Adjust inputs to model unit economics</div>`;
    
    app.innerHTML = html;
    attachListeners();
}

function inputField(label, field, value, prefix, suffix, step) {
    return `<div><div class="input-label">${label}</div><div class="input-wrap">${prefix ? '<span class="input-prefix">'+prefix+'</span>' : ''}<input type="number" data-field="${field}" value="${value}" step="${step||1}">${suffix ? '<span class="input-suffix">'+suffix+'</span>' : ''}</div></div>`;
}

let pendingRender = false, lastFocusedField = null;

function updateState(field, value) {
    const path = field.split(".");
    let val = parseFloat(value);
    if (isNaN(val)) val = 0;
    if (path.length === 2) {
        state[path[0]][path[1]] = val;
    } else if (path.length === 3) {
        state[path[0]][parseInt(path[1])][path[2]] = val;
    }
    pendingRender = true;
}

function attachListeners() {
    document.querySelectorAll("input[data-field]").forEach(el => {
        el.addEventListener("focus", function() {
            const currentField = this.dataset.field;
            if (lastFocusedField && lastFocusedField !== currentField && pendingRender) {
                pendingRender = false; render();
                setTimeout(() => { const newEl = document.querySelector('input[data-field="'+currentField+'"]'); if (newEl) { newEl.focus(); newEl.select(); } }, 10);
            } else { this.select(); }
            lastFocusedField = currentField;
        });
        el.addEventListener("input", function() { updateState(this.dataset.field, this.value); });
        el.addEventListener("blur", function() {
            setTimeout(() => {
                const activeEl = document.activeElement;
                if (!(activeEl && activeEl.dataset && activeEl.dataset.field) && pendingRender) { pendingRender = false; lastFocusedField = null; render(); }
            }, 50);
        });
        el.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                e.preventDefault(); updateState(this.dataset.field, this.value);
                pendingRender = false; render();
            }
        });
    });
}

render();
</script>
</body>
</html>
